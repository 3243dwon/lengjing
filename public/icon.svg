<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4F8"/>
      <stop offset="100%" style="stop-color:#E2EAF2"/>
    </linearGradient>
    <linearGradient id="prism" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8C8E8;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#8BB5DD;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6FA3D2;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="prism_edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="inner_glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0D4E8;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#D0E0F0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7EB5D6;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#7EB5D6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A8D0E6;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#A8D0E6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89C2D9;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#89C2D9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8D8EB;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#B8D8EB;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ray5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6EAAC8;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#6EAAC8;stop-opacity:0"/>
    </linearGradient>
    <filter id="glass_shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#6FA3D2" flood-opacity="0.15"/>
    </filter>
    <filter id="soft_glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Incoming white light beam -->
  <line x1="75" y1="256" x2="195" y2="256" stroke="url(#beam)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Prism body — glassy -->
  <polygon points="200,128 340,256 200,384" fill="url(#prism)" filter="url(#glass_shadow)"/>
  
  <!-- Glass inner highlight -->
  <polygon points="210,148 330,256 210,364" fill="url(#inner_glow)"/>
  
  <!-- Top edge highlight — glass refraction -->
  <line x1="200" y1="128" x2="340" y2="256" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
  
  <!-- Left edge highlight — bright glass edge -->
  <line x1="200" y1="128" x2="200" y2="384" stroke="url(#prism_edge)" stroke-width="2.5"/>
  
  <!-- Bottom edge subtle -->
  <line x1="200" y1="384" x2="340" y2="256" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  
  <!-- Refracted rays -->
  <line x1="340" y1="256" x2="438" y2="175" stroke="url(#ray5)" stroke-width="4.5" stroke-linecap="round" filter="url(#soft_glow)"/>
  <line x1="340" y1="256" x2="443" y2="215" stroke="url(#ray1)" stroke-width="4.5" stroke-linecap="round" filter="url(#soft_glow)"/>
  <line x1="340" y1="256" x2="445" y2="256" stroke="url(#ray2)" stroke-width="4.5" stroke-linecap="round" filter="url(#soft_glow)"/>
  <line x1="340" y1="256" x2="443" y2="297" stroke="url(#ray3)" stroke-width="4.5" stroke-linecap="round" filter="url(#soft_glow)"/>
  <line x1="340" y1="256" x2="438" y2="337" stroke="url(#ray4)" stroke-width="4.5" stroke-linecap="round" filter="url(#soft_glow)"/>
  
  <!-- Soft dot accents at ray ends -->
  <circle cx="438" cy="175" r="3.5" fill="#6EAAC8" opacity="0.5"/>
  <circle cx="443" cy="215" r="3" fill="#7EB5D6" opacity="0.5"/>
  <circle cx="445" cy="256" r="3" fill="#A8D0E6" opacity="0.5"/>
  <circle cx="443" cy="297" r="3" fill="#89C2D9" opacity="0.5"/>
  <circle cx="438" cy="337" r="3.5" fill="#B8D8EB" opacity="0.5"/>
</svg>
