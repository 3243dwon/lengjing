<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFE8D0"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8913A"/>
      <stop offset="100%" stop-color="#E8705A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Sun rays -->
  <g opacity="0.3" stroke="#E8913A" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="120" x2="256" y2="80"/>
    <line x1="330" y1="145" x2="356" y2="115"/>
    <line x1="375" y1="210" x2="410" y2="195"/>
    <line x1="182" y1="145" x2="156" y2="115"/>
    <line x1="137" y1="210" x2="102" y2="195"/>
  </g>
  <!-- Sun circle -->
  <circle cx="256" cy="230" r="80" fill="url(#sun)"/>
  <!-- Horizon line -->
  <rect x="80" y="310" width="352" height="4" rx="2" fill="#E8913A" opacity="0.4"/>
  <!-- Breeze waves -->
  <g fill="none" stroke="#E8913A" stroke-width="5" stroke-linecap="round" opacity="0.35">
    <path d="M120 350 Q188 335 256 350 Q324 365 392 350"/>
    <path d="M140 380 Q208 365 276 380 Q344 395 392 380"/>
    <path d="M120 410 Q188 395 256 410 Q324 425 370 410"/>
  </g>
</svg>
